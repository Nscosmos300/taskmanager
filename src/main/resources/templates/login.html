<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #f4f7f4; }
        .card { border-radius: 16px; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center fw-bold mb-1" style="color:#2d7a2d;">🌿 Task Manager</h3>
        <p class="text-center text-muted mb-4">Sign in to your account</p>

        <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
        <div th:if="${param.registered}" class="alert alert-success">Account created! Please log in.</div>
        <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>

        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required autofocus/>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-success w-100">Login</button>
        </form>

        <p class="text-center mt-3 mb-0" style="font-size:0.9rem;">
            Don't have an account?
            <a href="/register" style="color:#2d7a2d;">Register here</a>
        </p>
    </div>
</div>
</body>
</html>
